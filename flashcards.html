<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Flashcards</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){var t=localStorage.getItem('sublingo_theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));})();
  </script>
</head>
<body>

<!-- ── Study app-bar ──────────────────────────────────────────────────────── -->
<div class="study-appbar">
  <div class="study-appbar__inner">
    <a href="deck.html" class="study-appbar__back" aria-label="Back to deck">
      <i class="bi bi-chevron-left" style="font-size:1.1rem;"></i>
    </a>
    <span class="study-appbar__title" id="studyAppbarTitle"></span>
    <span></span>
  </div>
</div>

<!-- ── Study tab bar ─────────────────────────────────────────────────────── -->
<div class="study-tabs">
  <a href="words.html"      class="study-tab"><i class="bi bi-list-ul"></i> Words</a>
  <a href="flashcards.html" class="study-tab active"><i class="bi bi-card-text"></i> Flashcards</a>
  <a href="test.html"       class="study-tab"><i class="bi bi-patch-question"></i> Test</a>
</div>

<main class="container py-4" style="max-width:640px;">

  <!-- ── Study screen ──────────────────────────────────────────────────────── -->
  <div id="studyScreen">
    <div class="d-flex align-items-center justify-content-end mb-2">
      <span style="font-size:var(--sl-text-xs);font-weight:600;color:var(--sl-muted);" id="cardCounter">1 / —</span>
    </div>

    <div class="sl-progress mb-4">
      <div class="sl-progress-bar" id="progressBar" style="width:0%;"></div>
    </div>

    <!-- Flashcard -->
    <div class="flashcard-scene mb-2">
      <div class="flashcard" id="flashcard"
           onclick="flipCard()" role="button" tabindex="0"
           aria-label="Flashcard — click or press Space to flip"
           onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();flipCard();}">
        <!-- Front -->
        <div class="flashcard-face flashcard-front">
          <div class="text-center w-100">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
              <span class="flashcard-front__word" id="cardWord">—</span>
              <button class="btn-audio" id="audioBtn" title="Pronounce" aria-label="Pronounce word">
                <i class="bi bi-volume-up" aria-hidden="true"></i>
              </button>
            </div>
            <div class="flashcard-front__ipa" id="cardIpa"></div>
            <div class="mt-2" id="cardPosLevel"></div>
            <div class="mt-4 flip-hint">
              <i class="bi bi-hand-index me-1" aria-hidden="true"></i>Tap to reveal
              &nbsp;·&nbsp;
              <kbd style="font-size:.7rem;padding:.1rem .3rem;border-radius:4px;border:1px solid var(--sl-line);background:var(--sl-soft);">Space</kbd>
            </div>
          </div>
        </div>
        <!-- Back -->
        <div class="flashcard-face flashcard-back">
          <div class="text-center w-100">
            <div class="flashcard-back__translation" id="cardTranslation"></div>
            <div class="flashcard-back__definition"  id="cardDefinition"></div>
            <div class="flashcard-back__example"     id="cardExample"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="flip-hint mb-3">Rate yourself after seeing the answer &nbsp;·&nbsp; 1/2/3 keys work too</p>

    <!-- Rating buttons -->
    <div class="d-flex justify-content-center gap-2 flex-wrap mb-4">
      <button class="rating-btn rating-again" id="rateAgain" aria-label="Again">
        <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i> Again
      </button>
      <button class="rating-btn rating-hard" id="rateHard" aria-label="Hard">
        <i class="bi bi-emoji-neutral" aria-hidden="true"></i> Hard
      </button>
      <button class="rating-btn rating-easy" id="rateEasy" aria-label="Easy">
        <i class="bi bi-emoji-smile" aria-hidden="true"></i> Easy
      </button>
    </div>

    <!-- Prev / Skip -->
    <div class="d-flex justify-content-center gap-3">
      <button class="btn-ghost-sm" id="prevBtn" onclick="goBack()" disabled>
        <i class="bi bi-chevron-left" aria-hidden="true"></i> Previous
      </button>
      <button class="btn-ghost-sm" onclick="advance()">
        Skip <i class="bi bi-chevron-right" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <!-- ── Completion screen ─────────────────────────────────────────────────── -->
  <div id="completionScreen" class="d-none text-center py-4">
    <div class="result-circle mb-2">
      <i class="bi bi-trophy-fill" style="font-size:1.75rem;color:var(--sl-primary);"></i>
    </div>
    <h2 style="font-family:'Fraunces',Georgia,serif;font-weight:700;" class="mb-1">Deck complete!</h2>
    <p style="font-size:var(--sl-text-sm);color:var(--sl-muted);" class="mb-1">
      You reviewed all <strong id="summaryTotal">0</strong> words in
      <strong id="summaryDeck"></strong>.
    </p>
    <div class="row g-3 justify-content-center mb-4 mt-2">
      <div class="col-4">
        <div class="sl-card p-3 text-center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--sl-success);font-family:'Fraunces',Georgia,serif;" id="summaryEasy">0</div>
          <div style="font-size:var(--sl-text-xs);color:var(--sl-muted);">Easy</div>
        </div>
      </div>
      <div class="col-4">
        <div class="sl-card p-3 text-center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--sl-accent);font-family:'Fraunces',Georgia,serif;" id="summaryHard">0</div>
          <div style="font-size:var(--sl-text-xs);color:var(--sl-muted);">Hard</div>
        </div>
      </div>
      <div class="col-4">
        <div class="sl-card p-3 text-center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--sl-danger);font-family:'Fraunces',Georgia,serif;" id="summaryAgain">0</div>
          <div style="font-size:var(--sl-text-xs);color:var(--sl-muted);">Again</div>
        </div>
      </div>
    </div>
    <div class="d-flex flex-wrap justify-content-center gap-2">
      <button class="btn-ghost" onclick="restartDeck()"><i class="bi bi-arrow-repeat"></i> Study again</button>
      <a href="test.html" class="btn-primary-sl"><i class="bi bi-patch-question"></i> Take test</a>
      <a href="library.html" class="btn-ghost"><i class="bi bi-grid"></i> Library</a>
    </div>
  </div>

</main>

<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script src="js/flashcards.js"></script>
<script>
  if (!requireAuth()) { /* stops here */ }

  document.addEventListener('DOMContentLoaded', () => {
    initDeck();

    document.getElementById('audioBtn').addEventListener('click', e => {
      e.stopPropagation();
      playWordAudio(document.getElementById('cardWord').textContent);
    });

    document.getElementById('rateAgain').addEventListener('click', () => rateCard('again'));
    document.getElementById('rateHard').addEventListener('click',  () => rateCard('hard'));
    document.getElementById('rateEasy').addEventListener('click',  () => rateCard('easy'));

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') advance();
      if (e.key === 'ArrowLeft')  goBack();
      if (e.key === '1') rateCard('again');
      if (e.key === '2') rateCard('hard');
      if (e.key === '3') rateCard('easy');
    });
  });
</script>
</body>
</html>
