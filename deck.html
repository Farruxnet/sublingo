<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Deck</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){var t=localStorage.getItem('sublingo_theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));})();
  </script>
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="sl-navbar sticky-top">
  <div class="container d-flex align-items-center justify-content-between" style="max-width:1100px;">
    <a class="sl-brand" href="library.html">
      <span class="sl-brand-mark"><i class="bi bi-translate"></i></span>
      SubLingo
    </a>
    <div class="d-flex align-items-center gap-2">
      <button class="btn-theme" id="themeToggle" aria-label="Switch theme"><i class="bi bi-moon"></i></button>
      <span class="nav-user-chip"><i class="bi bi-person-circle"></i><span id="navUserChip">…</span></span>
      <button class="nav-logout-btn" id="logoutBtn" aria-label="Log out" title="Log out"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>

<main style="max-width:760px;margin:0 auto;padding:2rem 1.25rem 4rem;">

  <!-- Breadcrumb -->
  <a href="library.html"
     style="font-size:var(--sl-text-xs);color:var(--sl-muted);text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;margin-bottom:1.5rem;">
    <i class="bi bi-arrow-left"></i> My Library
  </a>

  <!-- Deck header -->
  <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-4">
    <div style="flex:1;min-width:0;">
      <h1 id="deckName"
          style="font-family:'Fraunces',Georgia,serif;font-size:var(--sl-text-xl);font-weight:700;margin:0 0 .25rem;line-height:1.15;"></h1>
      <div id="deckMeta" style="font-size:var(--sl-text-xs);color:var(--sl-muted);"></div>
    </div>
    <div id="deckRing" style="flex-shrink:0;"></div>
  </div>

  <!-- Progress bar -->
  <div class="sl-progress mb-5" id="progressWrap">
    <div class="sl-progress-bar" id="progressBar" style="width:0%;"></div>
  </div>

  <!-- Study mode tiles -->
  <div class="row g-3" id="hubTiles">
    <div class="col-12 col-sm-4">
      <a id="tileWords" href="words.html" class="hub-tile" aria-label="Browse word list">
        <div class="hub-tile__icon"><i class="bi bi-list-ul"></i></div>
        <div class="hub-tile__title">Words</div>
        <p class="hub-tile__desc">Browse all vocabulary in this deck</p>
      </a>
    </div>
    <div class="col-12 col-sm-4">
      <a id="tileFlash" href="flashcards.html" class="hub-tile hub-tile--accent" aria-label="Study with flashcards">
        <div class="hub-tile__icon"><i class="bi bi-card-text"></i></div>
        <div class="hub-tile__title">Flashcards</div>
        <p class="hub-tile__desc">Flip cards — see Uzbek translations</p>
      </a>
    </div>
    <div class="col-12 col-sm-4">
      <a id="tileTest" href="test.html" class="hub-tile" aria-label="Take a multiple-choice test">
        <div class="hub-tile__icon"><i class="bi bi-patch-question"></i></div>
        <div class="hub-tile__title">Test</div>
        <p class="hub-tile__desc">Multiple-choice quiz on this deck</p>
      </a>
    </div>
  </div>

  <!-- Empty-deck hint (hidden by default) -->
  <div id="emptyHint" class="d-none mt-4"
       style="font-size:var(--sl-text-xs);color:var(--sl-muted);background:var(--sl-soft);
              border-radius:var(--sl-radius-sm);padding:.75rem 1rem;">
    <i class="bi bi-info-circle me-1"></i>
    This deck has no words yet. Flashcards and Test require at least 2 words.
  </div>

</main>

<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script>
  if (!requireAuth()) { /* redirects */ }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    logoutUser();
    window.location.replace('index.html');
  });

  const deck = getActiveDeck();

  if (!deck) {
    showToast('No deck selected — pick one from your library', 'info');
    window.location.replace('library.html');
  } else {
    const { total, learned } = deck.stats;
    const pct     = total > 0 ? Math.round(learned / total * 100) : 0;
    const noWords = total === 0;
    const tooFew  = total < 2;

    document.title = `SubLingo — ${deck.name}`;
    document.getElementById('deckName').textContent = deck.name;
    document.getElementById('deckRing').innerHTML   = progressRingSVG(learned, total, 56, 5);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('deckMeta').innerHTML =
      `<span>${escapeHtml(deck.source)}</span>
       <span class="mx-1">·</span>
       <span>${total} words</span>
       <span class="mx-1">·</span>
       <span style="color:var(--sl-primary);font-weight:600;">${learned} learned (${pct}%)</span>
       <span class="mx-1">·</span>
       <span>Last studied: ${timeAgo(deck.lastStudied)}</span>`;

    if (noWords) {
      document.getElementById('tileFlash').classList.add('hub-tile--disabled');
      document.getElementById('tileTest').classList.add('hub-tile--disabled');
      document.getElementById('emptyHint').classList.remove('d-none');
    } else if (tooFew) {
      document.getElementById('tileTest').classList.add('hub-tile--disabled');
      document.getElementById('emptyHint').classList.remove('d-none');
      document.getElementById('emptyHint').innerHTML =
        '<i class="bi bi-info-circle me-1"></i>Test needs at least 2 words. Add more to unlock it.';
    }
  }
</script>
</body>
</html>
