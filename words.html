<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Extracted Words</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-md navbar-sublingo sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <span class="brand-logo"><i class="bi bi-translate"></i></span>
        <span>SubLingo</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="words.html"><i class="bi bi-list-ul me-1"></i>Words</a></li>
          <li class="nav-item"><a class="nav-link" href="flashcards.html"><i class="bi bi-card-text me-1"></i>Flashcards</a></li>
          <li class="nav-item"><a class="nav-link" href="test.html"><i class="bi bi-patch-question me-1"></i>Test</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="padding-bottom: 5rem !important;">

    <!-- ── Page header ──────────────────────────────────────────────────── -->
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
      <div>
        <h1 class="fs-4 fw-bold mb-0">Words found in this video</h1>
        <!-- TODO: replace hard-coded count with words extracted from real subtitle -->
        <p class="text-muted small mb-0" id="wordCountLabel">Showing <strong id="visibleCount">0</strong> of <strong>15</strong> words</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-sl btn-sm px-3" onclick="selectAll()">
          <i class="bi bi-check-all me-1"></i>Select All
        </button>
        <button class="btn btn-outline-secondary btn-sm px-3" onclick="clearAll()">
          <i class="bi bi-x-circle me-1"></i>Clear
        </button>
      </div>
    </div>

    <!-- ── Filter bar ────────────────────────────────────────────────────── -->
    <div class="filter-bar mb-4">
      <div class="row g-2 align-items-center">
        <div class="col-12 col-sm-5 col-md-4">
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search words…" oninput="renderWords()" />
          </div>
        </div>
        <div class="col-6 col-sm-4 col-md-3">
          <select id="levelFilter" class="form-select form-select-sm" onchange="renderWords()">
            <option value="">All CEFR Levels</option>
            <option value="A2">A2 — Elementary</option>
            <option value="B1">B1 — Intermediate</option>
            <option value="B2">B2 — Upper-Intermediate</option>
          </select>
        </div>
        <div class="col-6 col-sm-3 col-md-3">
          <select id="posFilter" class="form-select form-select-sm" onchange="renderWords()">
            <option value="">All Parts of Speech</option>
            <option value="noun">Nouns</option>
            <option value="verb">Verbs</option>
            <option value="adjective">Adjectives</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ── Word grid ─────────────────────────────────────────────────────── -->
    <!-- TODO: replace MOCK_WORDS with data from real subtitle extraction + translation API -->
    <div class="row g-3" id="wordsGrid"></div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-emoji-frown display-3 d-block mb-3"></i>
      <h5 class="fw-semibold">No words match your filters</h5>
      <p class="text-muted small">Try adjusting the search or CEFR level filter.</p>
    </div>

  </main>

  <!-- ── Sticky study bar ──────────────────────────────────────────────── -->
  <div class="study-bar d-flex align-items-center justify-content-between">
    <div>
      <span class="fw-semibold" id="selectedCountLabel">
        <i class="bi bi-check2-circle me-1" style="color: var(--sl-primary);"></i>
        <span id="selectedCount">0</span> words selected
      </span>
    </div>
    <button class="btn btn-primary px-4 py-2 fw-semibold" onclick="goStudy()" id="studyBtn" disabled>
      Study Selected <i class="bi bi-arrow-right ms-2"></i>
    </button>
  </div>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer>
    <strong>SubLingo</strong> &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </footer>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mockData.js"></script>
  <script src="js/main.js"></script>
  <script>
    function getFilteredWords() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const level = document.getElementById('levelFilter').value;
      const pos   = document.getElementById('posFilter').value;

      return MOCK_WORDS.filter(w => {
        const matchSearch = !query ||
          w.word.toLowerCase().includes(query) ||
          w.translation.toLowerCase().includes(query) ||
          w.definition.toLowerCase().includes(query);
        const matchLevel = !level || w.level === level;
        const matchPos   = !pos   || w.partOfSpeech.toLowerCase().includes(pos);
        return matchSearch && matchLevel && matchPos;
      });
    }

    function renderWords() {
      const filtered = getFilteredWords();
      const grid = document.getElementById('wordsGrid');
      const empty = document.getElementById('emptyState');

      document.getElementById('visibleCount').textContent = filtered.length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('d-none');
        return;
      }
      empty.classList.add('d-none');

      grid.innerHTML = filtered.map(w => {
        const isSelected = selectedWordIds.includes(w.id);
        return `
          <div class="col-12 col-md-6 col-xl-4">
            <div class="sl-card word-card p-3 h-100 ${isSelected ? 'selected' : ''}" id="card-${w.id}">

              <!-- Select toggle button -->
              <button class="select-toggle" onclick="toggleCard(${w.id})" title="${isSelected ? 'Remove from deck' : 'Add to deck'}">
                <i class="bi bi-check2"></i>
              </button>

              <!-- Word header -->
              <div class="d-flex align-items-center gap-2 pe-5 mb-1">
                <span class="word-title">${w.word}</span>
                <button class="btn-audio" onclick="playWordAudio('${w.word}')" title="Pronounce">
                  <i class="bi bi-volume-up"></i>
                </button>
              </div>

              <div class="d-flex align-items-center gap-2 flex-wrap mb-2">
                <span class="word-ipa">${w.ipa}</span>
                <span class="badge ${posBadgeClass(w.partOfSpeech)} rounded-pill px-2" style="font-size:0.72rem;">${w.partOfSpeech}</span>
                <span class="badge ${levelBadgeClass(w.level)} rounded-pill px-2" style="font-size:0.72rem;">${w.level}</span>
              </div>

              <!-- Uzbek translation -->
              <div class="word-translation mb-1">
                <i class="bi bi-translate me-1" style="font-size:0.8rem;"></i>${w.translation}
              </div>

              <!-- Definition -->
              <div class="small text-muted mb-1">${w.definition}</div>

              <!-- Example sentence -->
              <div class="word-example">"${w.example}"</div>

            </div>
          </div>`;
      }).join('');

      updateStudyBar();
    }

    function toggleCard(id) {
      toggleWordSelection(id);
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.toggle('selected', selectedWordIds.includes(id));
      }
      updateStudyBar();
    }

    function updateStudyBar() {
      const count = selectedWordIds.length;
      document.getElementById('selectedCount').textContent = count;
      const btn = document.getElementById('studyBtn');
      btn.disabled = count === 0;
    }

    function selectAll() {
      MOCK_WORDS.forEach(w => {
        if (!selectedWordIds.includes(w.id)) selectedWordIds.push(w.id);
      });
      saveSelectionToStorage();
      renderWords();
      showToast('All words added to deck', 'success');
    }

    function clearAll() {
      selectedWordIds = [];
      saveSelectionToStorage();
      renderWords();
      showToast('Deck cleared', 'info');
    }

    function goStudy() {
      if (selectedWordIds.length === 0) {
        showToast('Select at least one word first', 'danger');
        return;
      }
      // TODO: pass selected IDs to backend session or persist in localStorage
      navigateTo('flashcards.html');
    }

    // Initial render
    renderWords();
    updateStudyBar();
  </script>
</body>
</html>
