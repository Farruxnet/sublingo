<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Words</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="sl-navbar sticky-top">
  <div class="container d-flex align-items-center justify-content-between" style="max-width:1100px;">
    <a class="sl-brand" href="index.html">
      <span class="sl-brand-mark"><i class="bi bi-translate"></i></span>
      SubLingo
    </a>
    <button class="navbar-toggler border-0 d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" style="background:none;">
      <i class="bi bi-list fs-5" style="color:var(--sl-ink);"></i>
    </button>
    <div class="collapse navbar-collapse d-md-flex justify-content-end" id="mainNav">
      <nav class="d-flex gap-1 mt-2 mt-md-0">
        <a class="sl-nav-link" href="index.html"      data-page="index.html"><i class="bi bi-grid me-1"></i>Library</a>
        <a class="sl-nav-link" href="words.html"      data-page="words.html"><i class="bi bi-list-ul me-1"></i>Words</a>
        <a class="sl-nav-link" href="flashcards.html" data-page="flashcards.html"><i class="bi bi-card-text me-1"></i>Flashcards</a>
        <a class="sl-nav-link" href="test.html"       data-page="test.html"><i class="bi bi-patch-question me-1"></i>Test</a>
      </nav>
    </div>
  </div>
</nav>

<main style="max-width:1100px;margin:0 auto;padding:0 1.25rem 5rem;">

  <!-- ── Deck header ───────────────────────────────────────────────────────── -->
  <div class="deck-header mt-4" id="deckHeader">
    <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
      <div style="flex:1;min-width:0;">
        <a href="index.html" style="font-size:var(--sl-text-xs);color:var(--sl-muted);text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;margin-bottom:.5rem;">
          <i class="bi bi-arrow-left"></i> Library
        </a>
        <!-- Editable deck name — triggers renameDeck() on blur/Enter -->
        <input class="deck-header__name" id="deckNameHeading" type="text" maxlength="60"
               aria-label="Deck name (click to rename)"
               onblur="saveDeckName()" onkeydown="if(event.key==='Enter'){this.blur();}" />
        <div class="d-flex align-items-center gap-2 mt-1 flex-wrap" id="deckMeta"></div>
      </div>
      <div class="d-flex gap-2 flex-shrink-0 flex-wrap">
        <a href="flashcards.html" class="btn-primary-sl">
          <i class="bi bi-card-text"></i> Study deck
        </a>
        <a href="test.html" class="btn-ghost">
          <i class="bi bi-patch-question"></i> Test
        </a>
      </div>
    </div>
  </div>

  <!-- Empty state: no active deck -->
  <div id="noDeckState" class="sl-empty d-none">
    <div class="sl-empty__icon"><i class="bi bi-collection"></i></div>
    <h3 class="sl-empty__title">No deck selected</h3>
    <p class="sl-empty__body">Go back to the library and open a deck first.</p>
    <a href="index.html" class="btn-primary-sl">Back to Library</a>
  </div>

  <!-- ── Filters ───────────────────────────────────────────────────────────── -->
  <div class="sl-filters mb-4" id="filterBar">
    <div class="row g-2 align-items-center">
      <div class="col-12 col-sm-5 col-md-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-search" style="color:var(--sl-muted);font-size:.85rem;flex-shrink:0;"></i>
          <input type="text" id="searchInput" class="sl-input" placeholder="Search words…"
                 style="padding:.4rem .6rem;font-size:var(--sl-text-xs);" oninput="renderWords()" />
        </div>
      </div>
      <div class="col-6 col-sm-4 col-md-3">
        <select id="levelFilter" class="sl-input sl-select" style="padding:.4rem .6rem;font-size:var(--sl-text-xs);" onchange="renderWords()">
          <option value="">All CEFR levels</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
        </select>
      </div>
      <div class="col-6 col-sm-3 col-md-3">
        <select id="posFilter" class="sl-input sl-select" style="padding:.4rem .6rem;font-size:var(--sl-text-xs);" onchange="renderWords()">
          <option value="">All parts of speech</option>
          <option value="noun">Nouns</option>
          <option value="verb">Verbs</option>
          <option value="adjective">Adjectives</option>
        </select>
      </div>
      <div class="col-12 col-md-2 text-md-end">
        <span class="" style="font-size:var(--sl-text-xs);color:var(--sl-muted);">
          <span id="visibleCount">0</span> words
        </span>
      </div>
    </div>
  </div>

  <!-- ── Word grid ─────────────────────────────────────────────────────────── -->
  <!-- TODO: words come from getActiveDeck().words; replace with /api/session/words when backend exists -->
  <div class="row g-3" id="wordsGrid"></div>

  <div id="emptyWords" class="sl-empty d-none">
    <div class="sl-empty__icon"><i class="bi bi-search"></i></div>
    <h3 class="sl-empty__title">No words match</h3>
    <p class="sl-empty__body">Try a different search term or level filter.</p>
  </div>

</main>

<!-- ── Sticky bar ─────────────────────────────────────────────────────────── -->
<div class="study-bar" id="studyBar">
  <div class="d-flex align-items-center justify-content-between" style="max-width:1100px;margin:0 auto;">
    <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);" id="progressLabel"></span>
    <div class="d-flex gap-2">
      <a href="flashcards.html" class="btn-primary-sl">
        Study deck <i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script>
  const deck = getActiveDeck();

  function init() {
    if (!deck) {
      document.getElementById('noDeckState').classList.remove('d-none');
      document.getElementById('filterBar').classList.add('d-none');
      document.getElementById('studyBar').classList.add('d-none');
      document.getElementById('deckHeader').classList.add('d-none');
      return;
    }

    // Populate deck header
    document.getElementById('deckNameHeading').value = deck.name;
    updateDeckMeta();
    renderWords();
    updateStudyBar();
  }

  function updateDeckMeta() {
    const { total, learned } = deck.stats;
    const pct = total > 0 ? Math.round(learned / total * 100) : 0;
    document.getElementById('deckMeta').innerHTML = `
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">${deck.source}</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">·</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">${total} words</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">·</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-primary);font-weight:600;">${learned} learned (${pct}%)</span>`;
  }

  function saveDeckName() {
    const val = document.getElementById('deckNameHeading').value.trim();
    if (val && val !== deck.name) {
      renameDeck(deck.id, val);
      showToast('Deck renamed', 'success');
    } else {
      document.getElementById('deckNameHeading').value = deck.name;
    }
  }

  function getFilteredWords() {
    if (!deck) return [];
    const q     = document.getElementById('searchInput').value.toLowerCase().trim();
    const level = document.getElementById('levelFilter').value;
    const pos   = document.getElementById('posFilter').value;

    return deck.words.filter(w => {
      const mSearch = !q || w.word.toLowerCase().includes(q) || w.translation.toLowerCase().includes(q);
      const mLevel  = !level || w.level === level;
      const mPos    = !pos   || w.partOfSpeech.toLowerCase().includes(pos);
      return mSearch && mLevel && mPos;
    });
  }

  function renderWords() {
    const filtered = getFilteredWords();
    const grid  = document.getElementById('wordsGrid');
    const empty = document.getElementById('emptyWords');

    document.getElementById('visibleCount').textContent = filtered.length;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('d-none');
      return;
    }
    empty.classList.add('d-none');

    grid.innerHTML = filtered.map(w => `
      <div class="col-12 col-md-6 col-xl-4">
        <div class="word-card h-100">
          <div class="word-card__head">
            <span class="word-card__word">${w.word}</span>
            <button class="btn-audio" data-word="${w.word}" title="Pronounce">
              <i class="bi bi-volume-up"></i>
            </button>
            <span class="word-card__ipa ms-auto">${w.ipa}</span>
          </div>
          <div class="d-flex gap-1 mb-2 flex-wrap">
            <span class="${posBadgeClass(w.partOfSpeech)}">${w.partOfSpeech}</span>
            <span class="${levelBadgeClass(w.level)}">${w.level}</span>
            ${w.learned ? '<span class="badge-a"><i class="bi bi-check2 me-1"></i>Learned</span>' : ''}
          </div>
          <div class="word-card__translation">${w.translation}</div>
          <div class="word-card__definition">${w.definition}</div>
          <div class="word-card__example">"${w.example}"</div>
        </div>
      </div>`).join('');

    // Attach audio listeners (avoids onclick + string interpolation)
    grid.querySelectorAll('.btn-audio').forEach(btn => {
      btn.addEventListener('click', () => playWordAudio(btn.dataset.word));
    });

    updateStudyBar();
  }

  function updateStudyBar() {
    if (!deck) return;
    const { total, learned } = deck.stats;
    const pct = total > 0 ? Math.round(learned / total * 100) : 0;
    document.getElementById('progressLabel').textContent = `${learned} / ${total} words learned · ${pct}%`;
  }

  init();
</script>
</body>
</html>
