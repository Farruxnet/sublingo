<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Words</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function(){var t=localStorage.getItem('sublingo_theme');document.documentElement.setAttribute('data-theme',t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));})();
  </script>
</head>
<body>

<!-- ── Study app-bar ──────────────────────────────────────────────────────── -->
<div class="study-appbar">
  <div class="study-appbar__inner">
    <a href="deck.html" class="study-appbar__back" aria-label="Back to deck">
      <i class="bi bi-chevron-left" style="font-size:1.1rem;"></i>
    </a>
    <span class="study-appbar__title" id="studyAppbarTitle"></span>
    <span></span>
  </div>
</div>

<!-- ── Study tab bar ─────────────────────────────────────────────────────── -->
<div class="study-tabs" id="studyTabs">
  <a href="words.html"      class="study-tab active"><i class="bi bi-list-ul"></i> Words</a>
  <a href="flashcards.html" class="study-tab"><i class="bi bi-card-text"></i> Flashcards</a>
  <a href="test.html"       class="study-tab"><i class="bi bi-patch-question"></i> Test</a>
</div>

<main style="max-width:1100px;margin:0 auto;padding:0 1.25rem 5rem;">

  <!-- ── Deck header ───────────────────────────────────────────────────────── -->
  <div class="deck-header mt-4" id="deckHeader">
    <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
      <div style="flex:1;min-width:0;">
        <input class="deck-header__name" id="deckNameHeading" type="text" maxlength="60"
               aria-label="Deck name (click to rename)"
               onblur="saveDeckName()"
               onkeydown="if(event.key==='Enter'){this.blur();}" />
        <div class="d-flex align-items-center gap-2 mt-1 flex-wrap" id="deckMeta"></div>
      </div>
      <div class="d-flex gap-2 flex-shrink-0 flex-wrap">
        <a href="flashcards.html" class="btn-primary-sl"><i class="bi bi-card-text"></i> Study deck</a>
        <a href="test.html"       class="btn-ghost"><i class="bi bi-patch-question"></i> Test</a>
      </div>
    </div>
  </div>

  <!-- ── Filters ───────────────────────────────────────────────────────────── -->
  <div class="sl-filters mb-4" id="filterBar">
    <div class="row g-2 align-items-center">
      <div class="col-12 col-sm-5 col-md-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-search" style="color:var(--sl-muted);font-size:.85rem;flex-shrink:0;"></i>
          <input type="text" id="searchInput" class="sl-input"
                 placeholder="Search words…"
                 style="padding:.4rem .6rem;font-size:var(--sl-text-xs);"
                 oninput="renderWords()" />
        </div>
      </div>
      <div class="col-6 col-sm-4 col-md-3">
        <select id="levelFilter" class="sl-input sl-select"
                style="padding:.4rem .6rem;font-size:var(--sl-text-xs);"
                onchange="renderWords()">
          <option value="">All CEFR levels</option>
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
        </select>
      </div>
      <div class="col-6 col-sm-3 col-md-3">
        <select id="posFilter" class="sl-input sl-select"
                style="padding:.4rem .6rem;font-size:var(--sl-text-xs);"
                onchange="renderWords()">
          <option value="">All parts of speech</option>
          <option value="noun">Nouns</option>
          <option value="verb">Verbs</option>
          <option value="adjective">Adjectives</option>
        </select>
      </div>
      <div class="col-12 col-md-2 text-md-end">
        <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">
          <span id="visibleCount">0</span> words
        </span>
      </div>
    </div>
  </div>

  <!-- ── Word grid ─────────────────────────────────────────────────────────── -->
  <!-- TODO: replace with GET /api/session/words?deckId=… once backend exists -->
  <div class="row g-3" id="wordsGrid"></div>

  <div id="emptyWords" class="sl-empty d-none">
    <div class="sl-empty__icon"><i class="bi bi-search"></i></div>
    <h3 class="sl-empty__title">No words match</h3>
    <p class="sl-empty__body">Try a different search term or filter.</p>
  </div>

</main>

<!-- ── Sticky bar ────────────────────────────────────────────────────────── -->
<div class="study-bar" id="studyBar">
  <div class="d-flex align-items-center justify-content-between" style="max-width:1100px;margin:0 auto;">
    <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);" id="progressLabel"></span>
    <a href="flashcards.html" class="btn-primary-sl">Study deck <i class="bi bi-arrow-right ms-1"></i></a>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script>
  if (!requireAuth()) { /* stops here */ }

  const deck = getActiveDeck();

  function init() {
    if (!deck) {
      showToast('No deck selected — pick one from your library', 'info');
      setTimeout(() => window.location.replace('library.html'), 800);
      return;
    }
    document.getElementById('studyAppbarTitle').textContent = deck.name;
    document.getElementById('deckNameHeading').value = deck.name;
    updateDeckMeta();
    renderWords();
  }

  function updateDeckMeta() {
    const { total, learned } = deck.stats;
    const pct = total > 0 ? Math.round(learned / total * 100) : 0;
    document.getElementById('deckMeta').innerHTML = `
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">${escapeHtml(deck.source)}</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">·</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">${total} words</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);">·</span>
      <span style="font-size:var(--sl-text-xs);color:var(--sl-primary);font-weight:600;">${learned} learned (${pct}%)</span>`;
    document.getElementById('progressLabel').textContent = `${learned} / ${total} words learned · ${pct}%`;
  }

  function saveDeckName() {
    const val = document.getElementById('deckNameHeading').value.trim();
    if (val && val !== deck.name) {
      renameDeck(deck.id, val);
      showToast('Deck renamed', 'success');
    } else {
      document.getElementById('deckNameHeading').value = deck.name;
    }
  }

  function getFilteredWords() {
    if (!deck) return [];
    const q     = document.getElementById('searchInput').value.toLowerCase().trim();
    const level = document.getElementById('levelFilter').value;
    const pos   = document.getElementById('posFilter').value;
    return deck.words.filter(w => {
      const mQ = !q || w.word.toLowerCase().includes(q) || w.translation.toLowerCase().includes(q);
      const mL = !level || w.level === level;
      const mP = !pos   || w.partOfSpeech.toLowerCase().includes(pos);
      return mQ && mL && mP;
    });
  }

  function toggleLearned(wordId) {
    const word = deck.words.find(w => w.id === wordId);
    if (!word) return;
    markWordLearned(deck.id, wordId, !word.learned);
    // Refresh local deck reference and re-render
    deck = getActiveDeck();
    updateDeckMeta();
    renderWords();
  }

  function renderWords() {
    const filtered = getFilteredWords();
    const grid  = document.getElementById('wordsGrid');
    const empty = document.getElementById('emptyWords');
    document.getElementById('visibleCount').textContent = filtered.length;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('d-none');
      return;
    }
    empty.classList.add('d-none');

    grid.innerHTML = filtered.map(w => `
      <div class="col-12 col-md-6 col-xl-4">
        <div class="word-card h-100 d-flex flex-column">
          <div class="word-card__head">
            <span class="word-card__word">${escapeHtml(w.word)}</span>
            <button class="btn-audio" data-word="${escapeHtml(w.word)}" title="Pronounce" aria-label="Pronounce ${escapeHtml(w.word)}">
              <i class="bi bi-volume-up" aria-hidden="true"></i>
            </button>
            <span class="word-card__ipa ms-auto">${escapeHtml(w.ipa)}</span>
          </div>
          <div class="d-flex gap-1 mb-2 flex-wrap">
            <span class="${posBadgeClass(w.partOfSpeech)}">${escapeHtml(w.partOfSpeech)}</span>
            <span class="${levelBadgeClass(w.level)}">${escapeHtml(w.level)}</span>
          </div>
          <div class="word-card__translation">${escapeHtml(w.translation)}</div>
          <div class="word-card__definition">${escapeHtml(w.definition)}</div>
          <div class="word-card__example">"${escapeHtml(w.example)}"</div>
          <div class="mt-auto pt-2" style="border-top:1px solid var(--sl-line);margin-top:.75rem !important;">
            <button class="btn-ghost-sm w-100 justify-content-center learned-toggle"
                    data-word-id="${w.id}"
                    aria-label="${w.learned ? 'Mark as not learned' : 'Mark as learned'}"
                    style="${w.learned ? 'color:var(--sl-success);border-color:var(--sl-success);' : ''}">
              <i class="bi ${w.learned ? 'bi-check-circle-fill' : 'bi-circle'}" aria-hidden="true"></i>
              ${w.learned ? 'Learned' : 'Mark as learned'}
            </button>
          </div>
        </div>
      </div>`).join('');

    grid.querySelectorAll('.btn-audio').forEach(btn => {
      btn.addEventListener('click', () => playWordAudio(btn.dataset.word));
    });
    grid.querySelectorAll('.learned-toggle').forEach(btn => {
      btn.addEventListener('click', () => toggleLearned(parseInt(btn.dataset.wordId, 10)));
    });
  }

  init();
</script>
</body>
</html>
