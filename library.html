<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — My Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="sl-navbar sticky-top">
  <div class="container d-flex align-items-center justify-content-between" style="max-width:1100px;">
    <a class="sl-brand" href="library.html">
      <span class="sl-brand-mark"><i class="bi bi-translate"></i></span>
      SubLingo
    </a>
    <button class="navbar-toggler border-0 d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" style="background:none;">
      <i class="bi bi-list fs-5" style="color:var(--sl-ink);"></i>
    </button>
    <div class="collapse navbar-collapse d-md-flex align-items-center justify-content-end gap-2" id="mainNav">
      <nav class="d-flex gap-1 mt-2 mt-md-0">
        <a class="sl-nav-link" href="library.html"    data-page="library.html"><i class="bi bi-grid me-1"></i>Library</a>
        <a class="sl-nav-link" href="words.html"      data-page="words.html"><i class="bi bi-list-ul me-1"></i>Words</a>
        <a class="sl-nav-link" href="flashcards.html" data-page="flashcards.html"><i class="bi bi-card-text me-1"></i>Flashcards</a>
        <a class="sl-nav-link" href="test.html"       data-page="test.html"><i class="bi bi-patch-question me-1"></i>Test</a>
      </nav>
      <div class="d-flex align-items-center gap-2 ms-md-2 mt-2 mt-md-0">
        <span class="nav-user-chip"><i class="bi bi-person-circle"></i><span id="navUserChip">…</span></span>
        <button class="nav-logout-btn" onclick="handleLogout()" title="Log out"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </div>
</nav>

<main style="max-width:1100px;margin:0 auto;padding:0 1.25rem 3rem;">

  <!-- ── Page header ───────────────────────────────────────────────────────── -->
  <div class="d-flex align-items-center justify-content-between pt-4 mb-4 flex-wrap gap-2">
    <div>
      <h1 style="font-family:'Fraunces',Georgia,serif;font-size:var(--sl-text-xl);font-weight:700;margin:0;">My Library</h1>
      <p style="font-size:var(--sl-text-xs);color:var(--sl-muted);margin:.25rem 0 0;" id="deckCountLabel"></p>
    </div>
    <button class="btn-primary-sl" data-bs-toggle="modal" data-bs-target="#newDeckModal">
      <i class="bi bi-plus-lg"></i> New deck
    </button>
  </div>

  <!-- ── Deck grid ─────────────────────────────────────────────────────────── -->
  <div class="row g-3" id="deckGrid"></div>

  <!-- ── Empty state ───────────────────────────────────────────────────────── -->
  <div id="emptyLibrary" class="sl-empty d-none">
    <div class="sl-empty__icon"><i class="bi bi-collection"></i></div>
    <h2 class="sl-empty__title">No decks yet</h2>
    <p class="sl-empty__body">Create your first deck from a subtitle file to start learning vocabulary.</p>
    <button class="btn-primary-sl" data-bs-toggle="modal" data-bs-target="#newDeckModal">
      <i class="bi bi-plus-lg"></i> Create your first deck
    </button>
  </div>

</main>

<!-- ── New Deck Modal ────────────────────────────────────────────────────── -->
<div class="modal fade sl-modal" id="newDeckModal" tabindex="-1" aria-labelledby="newDeckTitle" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:520px;">
    <div class="modal-content" style="position:relative;overflow:hidden;">

      <!-- Loading overlay (shown while parse+extract "run") -->
      <div class="modal-loading-overlay d-none" id="loadingOverlay">
        <div class="modal-loading-overlay__spinner"></div>
        <div class="modal-loading-overlay__label" id="loadingLabel">Extracting vocabulary…</div>
      </div>

      <div class="modal-header border-0 pb-0 px-4 pt-4">
        <h2 class="modal-title" id="newDeckTitle" style="font-family:'Fraunces',Georgia,serif;font-size:var(--sl-text-lg);margin:0;">
          New deck
        </h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body px-4 py-3">

        <!-- Source tabs -->
        <div class="sl-pill-tabs mb-3" role="tablist">
          <button class="sl-pill-tab active" id="tab-file-btn" role="tab" aria-selected="true" onclick="switchTab('file')">
            <i class="bi bi-file-earmark-text me-1"></i>File
          </button>
          <button class="sl-pill-tab" id="tab-paste-btn" role="tab" aria-selected="false" onclick="switchTab('paste')">
            <i class="bi bi-clipboard me-1"></i>Paste
          </button>
          <button class="sl-pill-tab" disabled style="opacity:.4;">
            <i class="bi bi-youtube me-1"></i>YouTube
            <span style="font-size:.65rem;background:var(--sl-line);border-radius:4px;padding:.05rem .35rem;margin-left:.25rem;color:var(--sl-muted);">soon</span>
          </button>
        </div>

        <!-- File pane -->
        <div id="pane-file">
          <!-- TODO: showFileSelected() → FileReader.text() → POST /api/parse → POST /api/extract -->
          <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-zone__icon"><i class="bi bi-cloud-arrow-up"></i></div>
            <div class="upload-zone__title">Drag & drop or click to choose</div>
            <div class="upload-zone__hint">.srt and .vtt — up to 5 MB</div>
            <input type="file" id="fileInput" accept=".srt,.vtt,.txt" class="d-none" />
          </div>
          <div id="fileInfo" class="d-none mt-2" style="font-size:var(--sl-text-xs);color:var(--sl-primary);">
            <i class="bi bi-file-check me-1"></i><span id="fileName"></span>
          </div>
        </div>

        <!-- Paste pane -->
        <div id="pane-paste" class="d-none">
          <!-- TODO: send textarea value to POST /api/parse (format: "txt") → POST /api/extract -->
          <textarea id="pasteText" class="sl-input" rows="5"
            placeholder="Paste subtitle text or any English text here…"
            style="resize:vertical;"></textarea>
        </div>

        <!-- Deck name -->
        <div class="mt-3">
          <label class="sl-label" for="deckNameInput">Deck name</label>
          <input type="text" id="deckNameInput" class="sl-input" placeholder="e.g. Breaking Bad S01E01" maxlength="60" />
        </div>

        <!-- CEFR target -->
        <div class="mt-2">
          <label class="sl-label" for="deckLevelSelect">Target CEFR level</label>
          <select id="deckLevelSelect" class="sl-input sl-select">
            <option value="">All levels</option>
            <option value="A2">A2 — Elementary</option>
            <option value="B1">B1 — Intermediate</option>
            <option value="B2" selected>B2 — Upper-Intermediate</option>
            <option value="C1">C1 — Advanced</option>
          </select>
        </div>

      </div>

      <div class="modal-footer border-0 px-4 pb-4 pt-1 gap-2">
        <button class="btn-ghost flex-fill" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-primary-sl flex-fill justify-content-center" id="createBtn" onclick="handleCreateDeck()">
          <i class="bi bi-magic"></i> Create deck
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Rename Modal ───────────────────────────────────────────────────────── -->
<div class="modal fade sl-modal" id="renameDeckModal" tabindex="-1" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-body p-4">
        <label class="sl-label" for="renameInput">Rename deck</label>
        <input type="text" id="renameInput" class="sl-input" maxlength="60" />
      </div>
      <div class="modal-footer border-0 pt-0 pb-3 px-4 gap-2">
        <button class="btn-ghost-sm flex-fill" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-primary-sl btn-ghost-sm flex-fill justify-content-center"
                id="renameSaveBtn"
                style="background:var(--sl-primary);color:#fff;border:none;">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder &nbsp;·&nbsp; MVP v0.3
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script src="js/library.js"></script>
<script>
  // Auth guard
  if (!requireAuth()) { /* redirect happens inside requireAuth */ }
</script>
</body>
</html>
