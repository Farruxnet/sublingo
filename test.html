<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-md navbar-sublingo sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <span class="brand-logo"><i class="bi bi-translate"></i></span>
        <span>SubLingo</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="words.html"><i class="bi bi-list-ul me-1"></i>Words</a></li>
          <li class="nav-item"><a class="nav-link" href="flashcards.html"><i class="bi bi-card-text me-1"></i>Flashcards</a></li>
          <li class="nav-item"><a class="nav-link" href="test.html"><i class="bi bi-patch-question me-1"></i>Test</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 640px;">

    <!-- ── Progress strip ───────────────────────────────────────────────── -->
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="small fw-semibold text-muted" id="qCounter">Question 1 / 10</span>
      <span class="small fw-semibold" id="scoreDisplay" style="color: var(--sl-primary);">Score: 0</span>
    </div>
    <div class="progress mb-4" style="height: 8px; border-radius: 99px;">
      <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%; border-radius: 99px;" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <!-- ── Question screen ──────────────────────────────────────────────── -->
    <div id="questionScreen">

      <!-- Question card -->
      <div class="sl-card p-4 mb-3 text-center">
        <p class="text-muted small fw-semibold mb-2 text-uppercase tracking-wide">What is the Uzbek translation of</p>
        <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
          <h2 class="fw-bold mb-0" id="questionWord" style="font-size: 2rem;">—</h2>
          <button class="btn-audio" onclick="playWordAudio(document.getElementById('questionWord').textContent)" title="Pronounce">
            <i class="bi bi-volume-up"></i>
          </button>
        </div>
        <div class="text-muted small" id="questionIpa"></div>
      </div>

      <!-- Answer options -->
      <div class="d-grid gap-2 mb-3" id="answersGrid">
        <!-- Rendered by test.js -->
      </div>

      <!-- Feedback message -->
      <div id="feedbackMsg" class="alert d-none" role="alert"></div>

      <!-- Next button -->
      <div class="text-center mt-3">
        <button class="btn btn-primary px-5 py-2 fw-semibold d-none" id="nextBtn" onclick="nextQuestion()">
          Next <i class="bi bi-chevron-right ms-1"></i>
        </button>
      </div>

    </div><!-- /questionScreen -->

    <!-- ── Results screen ───────────────────────────────────────────────── -->
    <div id="resultsScreen" class="d-none text-center">

      <div class="result-circle" id="scoreCircle">
        <div class="score-num" id="finalScore">—</div>
        <div class="score-label">correct</div>
      </div>

      <h2 class="fw-bold mb-1">Test Complete!</h2>
      <p class="text-muted mb-1" id="resultMessage"></p>
      <p class="text-muted small mb-4">You scored <strong id="finalPct">—</strong> on this quiz.</p>

      <!-- Wrong answers -->
      <div id="wrongList" class="text-start mb-4"></div>

      <div class="d-flex flex-wrap justify-content-center gap-3">
        <button class="btn btn-outline-sl px-4 py-2 fw-semibold" onclick="restartTest()">
          <i class="bi bi-arrow-repeat me-2"></i>Try Again
        </button>
        <a href="flashcards.html" class="btn btn-primary px-4 py-2 fw-semibold">
          <i class="bi bi-card-text me-2"></i>Study Flashcards
        </a>
        <a href="index.html" class="btn btn-outline-secondary px-4 py-2">
          <i class="bi bi-house me-2"></i>Home
        </a>
      </div>

    </div><!-- /resultsScreen -->

  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer>
    <strong>SubLingo</strong> &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </footer>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mockData.js"></script>
  <script src="js/main.js"></script>
  <script src="js/test.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initTest();

      // Keyboard: Enter / Space to click next button when visible
      document.addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('nextBtn').classList.contains('d-none')) {
          e.preventDefault();
          nextQuestion();
        }
        // Number keys to select answer
        if (['1','2','3','4'].includes(e.key)) {
          const btns = document.querySelectorAll('.answer-btn:not([disabled])');
          const idx  = parseInt(e.key) - 1;
          if (btns[idx]) btns[idx].click();
        }
      });
    });
  </script>
</body>
</html>
