<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLingo — Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Feedback colours — only needed on this page */
    .feedback-correct { background: #dcfce7; color: var(--sl-success); font-size: var(--sl-text-xs); font-weight: 500; }
    .feedback-wrong   { background: var(--sl-danger-bg); color: var(--sl-danger); font-size: var(--sl-text-xs); font-weight: 500; }
  </style>
</head>
<body>

<!-- ── Navbar ────────────────────────────────────────────────────────────── -->
<nav class="sl-navbar sticky-top">
  <div class="container d-flex align-items-center justify-content-between" style="max-width:1100px;">
    <a class="sl-brand" href="index.html">
      <span class="sl-brand-mark"><i class="bi bi-translate"></i></span>
      SubLingo
    </a>
    <button class="navbar-toggler border-0 d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" style="background:none;">
      <i class="bi bi-list fs-5" style="color:var(--sl-ink);"></i>
    </button>
    <div class="collapse navbar-collapse d-md-flex justify-content-end" id="mainNav">
      <nav class="d-flex gap-1 mt-2 mt-md-0">
        <a class="sl-nav-link" href="index.html"      data-page="index.html"><i class="bi bi-grid me-1"></i>Library</a>
        <a class="sl-nav-link" href="words.html"      data-page="words.html"><i class="bi bi-list-ul me-1"></i>Words</a>
        <a class="sl-nav-link" href="flashcards.html" data-page="flashcards.html"><i class="bi bi-card-text me-1"></i>Flashcards</a>
        <a class="sl-nav-link" href="test.html"       data-page="test.html"><i class="bi bi-patch-question me-1"></i>Test</a>
      </nav>
    </div>
  </div>
</nav>

<main class="container py-4" style="max-width:640px;">

  <!-- ── No-deck empty state ───────────────────────────────────────────────── -->
  <div id="noDeckScreen" class="sl-empty d-none">
    <div class="sl-empty__icon"><i class="bi bi-collection"></i></div>
    <h2 class="sl-empty__title">No deck selected</h2>
    <p class="sl-empty__body" id="noDeckMsg">Go to the library and open a deck first.</p>
    <a href="index.html" class="btn-primary-sl">Back to Library</a>
  </div>

  <!-- ── Question screen ───────────────────────────────────────────────────── -->
  <div id="questionScreen">

    <div class="d-flex align-items-center justify-content-between mb-2">
      <a href="words.html" class="d-flex align-items-center gap-1"
         style="font-size:var(--sl-text-xs);color:var(--sl-muted);text-decoration:none;">
        <i class="bi bi-arrow-left"></i>
        <span id="deckLabel" style="font-weight:500;color:var(--sl-ink);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <span style="font-size:var(--sl-text-xs);color:var(--sl-muted);" id="qCounter">1 / 10</span>
        <span style="font-size:var(--sl-text-xs);font-weight:600;color:var(--sl-primary);" id="scoreDisplay">Score: 0</span>
      </div>
    </div>

    <div class="sl-progress mb-4">
      <div class="sl-progress-bar" id="progressBar" style="width:0%;"></div>
    </div>

    <!-- Question card -->
    <div class="sl-card p-4 mb-3 text-center">
      <p style="font-size:var(--sl-text-xs);font-weight:600;color:var(--sl-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;">
        What is the Uzbek translation of
      </p>
      <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
        <h2 id="questionWord" style="font-family:'Fraunces',Georgia,serif;font-size:2.2rem;font-weight:700;margin:0;letter-spacing:-.03em;">—</h2>
        <button class="btn-audio" id="audioBtn" title="Pronounce">
          <i class="bi bi-volume-up"></i>
        </button>
      </div>
      <div id="questionIpa" style="font-size:var(--sl-text-xs);color:var(--sl-primary);font-family:'Inter',monospace;"></div>
    </div>

    <!-- Answer grid -->
    <div class="d-grid gap-2 mb-2" id="answersGrid"></div>

    <!-- Feedback -->
    <div id="feedbackMsg" class="d-none"></div>

    <!-- Next -->
    <div class="text-center mt-3">
      <button class="btn-primary-sl d-none px-5" id="nextBtn" onclick="nextQuestion()">
        Next <i class="bi bi-chevron-right ms-1"></i>
      </button>
    </div>

  </div><!-- /questionScreen -->

  <!-- ── Results screen ────────────────────────────────────────────────────── -->
  <div id="resultsScreen" class="d-none text-center">

    <div class="result-circle" id="scoreCircle">
      <div class="score-num" id="finalScore">—</div>
      <div class="score-label">correct</div>
    </div>

    <h2 style="font-family:'Fraunces',Georgia,serif;font-weight:700;" class="mb-1">Test complete!</h2>
    <p style="font-size:var(--sl-text-sm);color:var(--sl-muted);" id="resultMessage" class="mb-0"></p>
    <p style="font-size:var(--sl-text-xs);color:var(--sl-muted);" class="mb-1">
      Deck: <strong id="resultDeck"></strong> &nbsp;·&nbsp; <strong id="finalPct">—</strong> score
    </p>

    <div id="wrongList" class="text-start my-4"></div>

    <div class="d-flex flex-wrap justify-content-center gap-2">
      <button class="btn-ghost" onclick="restartTest()">
        <i class="bi bi-arrow-repeat"></i> Try again
      </button>
      <a href="flashcards.html" class="btn-primary-sl">
        <i class="bi bi-card-text"></i> Study flashcards
      </a>
      <a href="index.html" class="btn-ghost">
        <i class="bi bi-grid"></i> Library
      </a>
    </div>

  </div><!-- /resultsScreen -->

</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer>
  <div style="max-width:1100px;margin:0 auto;padding:0 1.25rem;">
    <strong style="font-family:'Fraunces',Georgia,serif;">SubLingo</strong>
    &nbsp;·&nbsp; English–Uzbek vocabulary builder
  </div>
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script src="js/test.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initTest();

    document.getElementById('audioBtn').addEventListener('click', () => {
      playWordAudio(document.getElementById('questionWord').textContent);
    });

    // Keyboard: 1-4 pick answer, Enter/Space advance when Next is visible
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if ((e.key === 'Enter' || e.key === ' ') && !document.getElementById('nextBtn').classList.contains('d-none')) {
        e.preventDefault();
        nextQuestion();
      }
      if (['1','2','3','4'].includes(e.key)) {
        const btns = document.querySelectorAll('.answer-btn:not([disabled])');
        const b = btns[parseInt(e.key) - 1];
        if (b) b.click();
      }
    });
  });
</script>
</body>
</html>
